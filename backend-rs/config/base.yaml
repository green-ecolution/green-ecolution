application:
  port: 3020
database:
  host: "127.0.0.1"
  port: 5432
  username: "postgres"
  password: "postgres"
  database_name: "postgres"
  max_connections: 5
  log_statements_level: "debug"
  slow_query_threshold_ms: 500
log:
  level: "info,sqlx=warn,tower_http=debug"
  format: "pretty"
cors:
  allowed_origins:
    - "*"
auth:
  enabled: true
  jwks_refresh_interval_secs: 3600
  jwks_refresh_timeout_secs: 5
