name: "Backend - Pull Request Checks"

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'justfile'
              - '.github/workflows/backend-pr.yaml'
              - '.github/actions/setup-backend/**'
            docker:
              - 'backend/Dockerfile'
              - 'backend/.dockerignore'
              - 'backend/Cargo.lock'
              - '.github/workflows/backend-pr.yaml'

  build_and_test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - name: Setup Dependencies
        uses: ./.github/actions/setup-backend

      - name: Check domain crate stays portable
        working-directory: ./backend
        run: cargo build -p domain --no-default-features --locked

      - name: Verify Docker daemon (testcontainers prerequisite)
        run: docker version

      - name: Test workspace
        working-directory: ./backend
        run: cargo test --workspace --locked

  msrv:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - name: Read MSRV from Cargo.toml
        id: msrv
        run: echo "msrv=$(grep -m1 '^rust-version' backend/Cargo.toml | cut -d'"' -f2)" >> "$GITHUB_OUTPUT"

      - name: Setup MSRV toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.msrv }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          cache-on-failure: "true"

      - name: Check workspace with MSRV
        working-directory: ./backend
        run: cargo check --workspace --locked

  lint:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-backend

      - name: cargo fmt
        working-directory: ./backend
        run: cargo fmt --all -- --check

      - name: cargo clippy
        working-directory: ./backend
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  check_sqlx_prepared:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgis/postgis:17-3.5-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 5s
        ports:
          - 5432:5432
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
      SQLX_OFFLINE: "false"
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-backend

      - name: Install sqlx-cli
        uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli

      - name: Apply migrations
        run: just migrate-up

      - name: Check that queries are fresh
        working-directory: ./backend
        run: cargo sqlx prepare --workspace --check -- --all-targets

  test_migrations:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgis/postgis:17-3.5-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 5s
        ports:
          - 5432:5432
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-backend

      - name: Apply migrations up
        run: just migrate-up

      - name: Reset and re-apply migrations
        run: just migrate-reset

  # Full workspace compilation is already covered by build_and_test; this
  # only needs to run when the image definition itself changes.
  test_dockerfile:
    needs: changes
    if: needs.changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Test backend Dockerfile
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: backend:test
          cache-from: type=gha,scope=backend-dockerfile
          cache-to: type=gha,mode=max,scope=backend-dockerfile

  backend-pr-ok:
    name: Backend PR OK
    if: always()
    needs:
      [
        build_and_test,
        msrv,
        lint,
        check_sqlx_prepared,
        test_migrations,
        test_dockerfile,
      ]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify all jobs passed
        run: |
          results=(
            "${{ needs.build_and_test.result }}"
            "${{ needs.msrv.result }}"
            "${{ needs.lint.result }}"
            "${{ needs.check_sqlx_prepared.result }}"
            "${{ needs.test_migrations.result }}"
            "${{ needs.test_dockerfile.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::One or more jobs failed or were cancelled ($r)"
              exit 1
            fi
          done
