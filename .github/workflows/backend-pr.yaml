name: "Backend - Pull Request Checks"

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'justfile'
              - '.github/workflows/backend-pr.yaml'
              - '.github/actions/setup-backend/**'

  build_and_test:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Dependencies
        uses: ./.github/actions/setup-backend

      - name: Build backend
        run: just build-backend

      - name: Test
        working-directory: ./backend
        run: go test -cover ./...

  lint:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-backend

      - name: Run go fmt check
        working-directory: ./backend
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Go code is not formatted. Please run 'go fmt ./...'"
            gofmt -d .
            exit 1
          fi

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          working-directory: ./backend
          args: --timeout=5m

  check_generated_backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-backend
      - name: Generate backend code
        run: just generate-backend
      - name: Check generated code is fresh
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "::error::Backend generated code is out of date."
            echo "Please run 'just generate-backend' locally and commit the updated files."
            echo
            echo "Modified files:"
            git status --short
            echo
            git diff
            exit 1
          fi
          echo "Generated backend code is up to date."

  check_generated_client:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-backend
        with:
          with-cgo-deps: "false"
      - name: Generate OpenAPI client
        run: just generate-client
      - name: Check generated client is fresh
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "::error::Generated OpenAPI client is out of date."
            echo "Please run 'just generate-client' locally and commit the updated files."
            echo
            echo "Modified files:"
            git status --short
            echo
            git diff
            exit 1
          fi
          echo "Generated client is up to date."

  test_pkg_client:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-backend
        with:
          with-cgo-deps: "false"
      - name: Test pkg/client
        working-directory: ./backend/pkg/client
        run: go test ./...

  test_migrations:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    services:
      postgres:
        image: postgis/postgis:17-3.5
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
          --health-start-period 5s
        ports:
          - 5432:5432
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-backend
        with:
          with-cgo-deps: "false"
      - name: Test migrations up
        run: just migrate-up
      - name: Test migrations down
        run: just migrate-down

  test_dockerfile:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Test backend Dockerfile
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: backend:test
          cache-from: type=gha,scope=backend-dockerfile
          cache-to: type=gha,mode=max,scope=backend-dockerfile

  pr-ok:
    if: always()
    needs: [build_and_test, lint, check_generated_backend, check_generated_client, test_pkg_client, test_migrations, test_dockerfile]
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - name: Verify all jobs passed
        run: |
          results=(
            "${{ needs.build_and_test.result }}"
            "${{ needs.lint.result }}"
            "${{ needs.check_generated_backend.result }}"
            "${{ needs.check_generated_client.result }}"
            "${{ needs.test_pkg_client.result }}"
            "${{ needs.test_migrations.result }}"
            "${{ needs.test_dockerfile.result }}"
          )
          for r in "${results[@]}"; do
            if [[ "$r" != "success" && "$r" != "skipped" ]]; then
              echo "::error::One or more jobs failed or were cancelled ($r)"
              exit 1
            fi
          done
