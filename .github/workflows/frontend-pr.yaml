name: "Frontend - Pull Request Checks"

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/frontend-pr.yaml'
              - '.github/actions/setup-frontend/**'

  build:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-frontend
      - name: Build
        working-directory: ./frontend
        run: pnpm build

  lint:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-frontend
      - name: Build workspace dependencies
        working-directory: ./frontend
        run: pnpm --filter=!frontend -r build
      - name: Lint
        working-directory: ./frontend
        run: pnpm lint

  test:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-frontend
      - name: Build workspace dependencies
        working-directory: ./frontend
        run: pnpm --filter=!frontend -r build
      - name: Test
        working-directory: ./frontend
        run: pnpm test

  test_dockerfile:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Test frontend Dockerfile
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: frontend:test
          cache-from: type=gha,scope=frontend-dockerfile
          cache-to: type=gha,mode=max,scope=frontend-dockerfile

  check_generated:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-frontend
      - name: Generate frontend code
        working-directory: ./frontend
        run: pnpm generate:local
      - name: Check generated code is fresh
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "::error::Generated frontend code is out of date."
            echo "Please run 'just generate-frontend' (or 'pnpm generate:local' in ./frontend) locally and commit the updated files."
            echo
            git status --short
            echo
            git diff
            exit 1
          fi
          echo "Generated frontend code is up to date."
