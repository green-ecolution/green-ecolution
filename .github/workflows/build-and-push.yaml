name: "Build and Push Images"

on:
  # Build stage images when release PR is created/updated
  pull_request:
    types: [opened, synchronize, labeled]
    branches:
      - main

  # Build prod images when tag is pushed
  push:
    tags:
      - "v*"

  # Manual trigger for any environment
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stage
          - prod
      version:
        description: "Version tag for prod (e.g. v0.1.1)"
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: green-ecolution/green-ecolution

jobs:
  check-release-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should-build: ${{ steps.check.outputs.should-build }}
    steps:
      - name: Check if should build
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'autorelease: pending') }}" == "true" ]]; then
              echo "should-build=true" >> $GITHUB_OUTPUT
              echo "✅ Release PR detected, will build"
            else
              echo "should-build=false" >> $GITHUB_OUTPUT
              echo "ℹ️ Not a release PR, skipping build"
            fi
          else
            # Tag push or workflow_dispatch - always build
            echo "should-build=true" >> $GITHUB_OUTPUT
            echo "✅ Tag or manual trigger, will build"
          fi

  determine-environment:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: check-release-pr
    if: needs.check-release-pr.outputs.should-build == 'true'
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      is-release: ${{ steps.set-env.outputs.is-release }}
      image-tag: ${{ steps.set-env.outputs.image-tag }}
      checkout-ref: ${{ steps.set-env.outputs.checkout-ref }}
    steps:
      - name: Determine environment and tag suffix
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ENV="${{ github.event.inputs.environment }}"
            if [[ "$ENV" == "prod" ]]; then
              TAG_SUFFIX=""
              IS_RELEASE="true"
              VERSION="${{ github.event.inputs.version }}"
              if [[ -z "$VERSION" ]]; then
                echo "❌ Version is required for prod builds"
                exit 1
              fi
              IMAGE_TAG="${VERSION}"
              CHECKOUT_REF="${VERSION}"
            else
              TAG_SUFFIX="-${ENV}"
              IS_RELEASE="false"
              IMAGE_TAG="${{ github.ref_name }}-$(echo ${{ github.sha }} | cut -c1-7)${TAG_SUFFIX}"
              CHECKOUT_REF="${{ github.sha }}"
            fi
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            ENV="prod"
            TAG_SUFFIX=""
            IS_RELEASE="true"
            IMAGE_TAG="${{ github.ref_name }}"
            CHECKOUT_REF="${{ github.ref }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            ENV="stage"
            TAG_SUFFIX="-stage"
            IS_RELEASE="false"
            CHECKOUT_REF="${{ github.event.pull_request.head.sha }}"

            # Extract version from PR title
            PR_TITLE="${{ github.event.pull_request.title }}"
            VERSION=$(echo "$PR_TITLE" | grep -oE 'v[0-9]+\.[0-9]+\.[0-9]+' | head -1)

            if [[ -n "$VERSION" ]]; then
              SHORT_SHA=$(echo "${{ github.event.pull_request.head.sha }}" | cut -c1-7)
              IMAGE_TAG="${VERSION}-${SHORT_SHA}-stage"
            else
              IMAGE_TAG="pr-${{ github.event.pull_request.number }}-$(echo ${{ github.event.pull_request.head.sha }} | cut -c1-7)-stage"
            fi
          else
            ENV="stage"
            TAG_SUFFIX="-stage"
            IS_RELEASE="false"
            IMAGE_TAG="${{ github.ref_name }}-$(echo ${{ github.sha }} | cut -c1-7)${TAG_SUFFIX}"
            CHECKOUT_REF="${{ github.sha }}"
          fi

          echo "environment=$ENV" >> $GITHUB_OUTPUT
          echo "is-release=$IS_RELEASE" >> $GITHUB_OUTPUT
          echo "checkout-ref=$CHECKOUT_REF" >> $GITHUB_OUTPUT
          echo "image-tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Environment: $ENV, Tag Suffix: $TAG_SUFFIX, Is Release: $IS_RELEASE, Image Tag: $IMAGE_TAG"

  build-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [check-release-pr, determine-environment]
    if: needs.check-release-pr.outputs.should-build == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.determine-environment.outputs.checkout-ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build time
        id: build-time
        run: echo "timestamp=$(date -u +"%Y-%m-%dT%H:%M:%SZ")" >> $GITHUB_OUTPUT

      - name: Compute short SHA
        id: short-sha
        run: |
          FULL_SHA="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          echo "short=$(echo $FULL_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Build and push backend
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${{ needs.determine-environment.outputs.image-tag }}
          build-args: |
            APP_VERSION=${{ needs.determine-environment.outputs.image-tag }}
            APP_REVISION=${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
            GE_GIT_COMMIT=${{ steps.short-sha.outputs.short }}
            GE_GIT_BRANCH=${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
            GE_BUILD_TIME=${{ steps.build-time.outputs.timestamp }}
          cache-from: type=gha,scope=build-backend
          cache-to: type=gha,mode=max,scope=build-backend

  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [check-release-pr, determine-environment]
    if: needs.check-release-pr.outputs.should-build == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.determine-environment.outputs.checkout-ref }}

      - uses: ./.github/actions/setup-frontend

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ needs.determine-environment.outputs.image-tag }}
          build-args: |
            ENV=${{ needs.determine-environment.outputs.environment == 'stage' && 'dev' || 'prod' }}
            BASEURL=/api
            APP_VERSION=${{ needs.determine-environment.outputs.image-tag }}
          cache-from: type=gha,scope=build-frontend
          cache-to: type=gha,mode=max,scope=build-frontend

  comment-stage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      [check-release-pr, determine-environment, build-backend, build-frontend]
    if: needs.check-release-pr.outputs.should-build == 'true' && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Get Green Ecolution App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Update deployment comment on PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          TAG="${{ needs.determine-environment.outputs.image-tag }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          MARKER="<!-- stage-deployment-comment -->"

          # Replace any previous deployment comment
          COMMENT_IDS=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${MARKER}\")) | .id")

          for COMMENT_ID in $COMMENT_IDS; do
            echo "Deleting old deployment comment: ${COMMENT_ID}"
            gh api -X DELETE "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}"
          done

          gh pr comment ${PR_NUMBER} --repo "${{ github.repository }}" --body "${MARKER}
          ## 🚀 Stage Images Built

          Docker images for this release PR have been built and pushed to \`${{ env.REGISTRY }}\`.

          ### 🐳 Docker Images
          - Backend: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${TAG}\`
          - Frontend: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${TAG}\`

          ### 🔄 ArgoCD Image Updater
          Deployment manifests live in the separate deployment repository. The ArgoCD Image Updater watches the registry and rolls out the new \`-stage\` images to the stage environment automatically.

          Preview: https://app.stage.green-ecolution.de

          ---
          *Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')*"

  log-build-info:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs:
      [check-release-pr, determine-environment, build-backend, build-frontend]
    if: needs.check-release-pr.outputs.should-build == 'true' && always()
    steps:
      - name: Log build information
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          TAG="${{ needs.determine-environment.outputs.image-tag }}"
          IS_RELEASE="${{ needs.determine-environment.outputs.is-release }}"

          if [[ "$IS_RELEASE" == "true" ]]; then
            echo "## 🌿 Production Release Build Complete" >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🧪 Stage Build Complete" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${ENV}" >> $GITHUB_STEP_SUMMARY
          echo "**Image Tag:** ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🐳 Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "* Backend: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/backend:${TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "* Frontend: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 ArgoCD Image Updater" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployment manifests live in the separate deployment repository and are rolled out automatically by the ArgoCD Image Updater." >> $GITHUB_STEP_SUMMARY
