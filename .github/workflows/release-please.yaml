name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Get Green Ecolution App Token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ vars.APP_CLIENT_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please bumps backend/Cargo.toml's workspace version on the
      # release PR but does not touch Cargo.lock. Sync it here so the release
      # PR stays buildable with --locked.
      - name: Get bot user id
        if: ${{ steps.release.outputs.pr }}
        id: get-user-id
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Resolve release PR branch
        if: ${{ steps.release.outputs.pr }}
        id: pr-branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PR_NUMBER=$(echo '${{ steps.release.outputs.pr }}' | jq -r '.number')
          BRANCH=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" --jq '.head.ref')
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Checkout release PR branch
        if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ steps.pr-branch.outputs.branch }}
          fetch-depth: 0

      # release-please bumps versions but does not touch date fields. Keep
      # them in sync so the release PR carries the (approximate) release date.
      - name: Update release date fields
        if: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          TODAY=$(date -u +%F)
          sed -i "s/^releaseDate: .*/releaseDate: ${TODAY}/" publiccode.yml
          sed -i "s/^date-released: .*/date-released: \"${TODAY}\"/" CITATION.cff
          if git diff --quiet publiccode.yml CITATION.cff; then
            echo "Release date fields already in sync"
            exit 0
          fi
          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git add publiccode.yml CITATION.cff
          git commit -m "chore: update release date fields after release-please version bump"

      - name: Setup Rust toolchain
        if: ${{ steps.release.outputs.pr }}
        uses: ./.github/actions/setup-backend

      - name: Sync Cargo.lock with bumped workspace version
        if: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          cargo update \
            --manifest-path backend/Cargo.toml \
            -p server -p domain -p domain-wasm
          if git diff --quiet backend/Cargo.lock; then
            echo "Cargo.lock already in sync"
            exit 0
          fi
          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git add backend/Cargo.lock
          git commit -m "chore: sync Cargo.lock after release-please version bump"

      - name: Setup pnpm
        if: ${{ steps.release.outputs.pr }}
        uses: pnpm/action-setup@v5
        with:
          package_json_file: "./frontend/package.json"

      - name: Setup Node
        if: ${{ steps.release.outputs.pr }}
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "./frontend/pnpm-lock.yaml"

      - name: Regenerate backend client after version bump
        if: ${{ steps.release.outputs.pr }}
        run: |
          set -euo pipefail
          just dump-openapi
          cd frontend
          pnpm install --frozen-lockfile
          pnpm generate:local
          cd ..
          if git diff --quiet -- frontend/packages/backend-client; then
            echo "Backend client already in sync"
            exit 0
          fi
          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.get-user-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'
          git add frontend/packages/backend-client/api-docs.json frontend/packages/backend-client/src
          git commit -m "chore: regenerate backend client after release-please version bump"

      - name: Push changes
        if: ${{ steps.release.outputs.pr }}
        run: |
          git push origin "${{ steps.pr-branch.outputs.branch }}"

      - name: Output release info
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: |
          echo "Release created: ${{ steps.release.outputs.tag_name }}"
          echo "Version: ${{ steps.release.outputs.version }}"
          echo ""
          echo "The build-and-push workflow will be triggered automatically by the tag push."
