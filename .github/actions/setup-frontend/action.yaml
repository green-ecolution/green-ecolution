name: "Setup Frontend"
description: "Shared setup for frontend CI jobs: pnpm + Node.js + Rust/wasm-pack + install deps"
runs:
  using: "composite"
  steps:
    - uses: pnpm/action-setup@v5
      with:
        package_json_file: "./frontend/package.json"
    - uses: actions/setup-node@v6
      with:
        node-version: "24"
        cache: "pnpm"
        cache-dependency-path: "./frontend/pnpm-lock.yaml"
    - name: Install just
      uses: taiki-e/install-action@v2
      with:
        tool: just
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: wasm32-unknown-unknown
    - name: Install wasm-pack
      uses: taiki-e/install-action@v2
      with:
        tool: wasm-pack
    - name: Cache cargo registry + target
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          backend/target
        key: ${{ runner.os }}-cargo-domain-wasm-${{ hashFiles('backend/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-domain-wasm-
    - name: Install dependencies
      shell: bash
      working-directory: ./frontend
      run: pnpm install --frozen-lockfile
    - name: Build domain WASM bindings
      shell: bash
      run: just build-domain-wasm
