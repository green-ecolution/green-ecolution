apiVersion: batch/v1
kind: CronJob
metadata:
  name: clean-db
spec:
  schedule: "0 0 * * *"
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: init-migrations
              image: backend-image
              imagePullPolicy: Always
              command: ["./migrate"]
              args: ["reset", "--with-seed"]
              env:
                - name: APP_DATABASE__DATABASE_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: backend-config
                      key: GE_SERVER_DATABASE_NAME
                - name: APP_DATABASE__HOST
                  valueFrom:
                    configMapKeyRef:
                      name: backend-config
                      key: GE_SERVER_DATABASE_HOST
                - name: APP_DATABASE__PORT
                  valueFrom:
                    configMapKeyRef:
                      name: backend-config
                      key: GE_SERVER_DATABASE_PORT
                - name: APP_DATABASE__USERNAME
                  valueFrom:
                    secretKeyRef:
                      name: backend-secrets
                      key: GE_SERVER_DATABASE_USERNAME
                - name: APP_DATABASE__PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: backend-secrets
                      key: GE_SERVER_DATABASE_PASSWORD
          restartPolicy: OnFailure
