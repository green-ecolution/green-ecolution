# https://kubernetes.io/docs/concepts/configuration/configmap/
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  APP_ENVIRONMENT: "production"
  APP_APPLICATION__PORT: "3000"
  APP_APPLICATION__BASE_URL: "https://demo.green-ecolution.de"

  APP_DATABASE__HOST: "postgresql.postgres.svc.cluster.local"
  APP_DATABASE__PORT: "5432"
  APP_DATABASE__DATABASE_NAME: "green-ecolution-demo"

  # Auth disabled for demo; placeholders satisfy the required Settings fields.
  APP_AUTH__ENABLED: "false"
  APP_AUTH__ISSUER_URL: "https://placeholder.invalid/realms/disabled"
  APP_AUTH__FRONTEND_CLIENT_ID: "disabled"
  APP_AUTH__BACKEND_CLIENT_ID: "disabled"
  APP_AUTH__BACKEND_CLIENT_SECRET: "disabled"
  APP_AUTH__DEFAULT_REDIRECT_URL: "https://demo.green-ecolution.de"

  APP_MQTT__ENABLED: "false"

  TZ: "Europe/Berlin"
