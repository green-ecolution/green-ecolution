# https://kubernetes.io/docs/concepts/configuration/configmap/
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
data:
  APP_URL: "https://app.green-ecolution.de"
  PORT: "3000"
  DEVELOPMENT: "true"
  GE_MQTT_BROKER: "eu1.cloud.thethings.industries:1883"
  GE_MQTT_TOPIC: "v3/sgr-students@zde/devices/tree-sensor/up"

  GE_MAP_NEAREST_TREE_MAX_RADIUS: "500"
  GE_MAP_NEAREST_TREE_DEFAULT_LIMIT: "10"
  GE_MAP_NEAREST_TREE_MAX_LIMIT: "50"
---

