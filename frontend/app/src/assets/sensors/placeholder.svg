<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" fill="none" role="img" aria-label="Generischer Sensor">
  <defs>
    <linearGradient id="ph-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F6F6F4"/>
      <stop offset="100%" stop-color="#DCDCD8"/>
    </linearGradient>
    <linearGradient id="ph-ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4C7741" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4C7741" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Soft halo -->
  <circle cx="128" cy="132" r="116" fill="url(#ph-ring)"/>

  <!-- Antenna -->
  <line x1="128" y1="56" x2="128" y2="86" stroke="#353535" stroke-width="3" stroke-linecap="round"/>
  <circle cx="128" cy="52" r="5" fill="#4C7741"/>

  <!-- Signal arcs -->
  <g stroke="#4C7741" fill="none" stroke-linecap="round" stroke-width="2.5">
    <path d="M 106 66 Q 128 44 150 66" opacity="0.85"/>
    <path d="M 94 56 Q 128 24 162 56" opacity="0.55"/>
    <path d="M 80 46 Q 128 4 176 46" opacity="0.22"/>
  </g>

  <!-- Sensor body -->
  <rect x="68" y="86" width="120" height="146" rx="16" fill="url(#ph-body)" stroke="#6E6E6E" stroke-width="2"/>

  <!-- Inner display -->
  <rect x="82" y="104" width="92" height="64" rx="8" fill="#353535"/>
  <line x1="94" y1="124" x2="162" y2="124" stroke="#A8C84B" stroke-width="2" stroke-linecap="round" opacity="0.85"/>
  <line x1="94" y1="138" x2="144" y2="138" stroke="#A8C84B" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <line x1="94" y1="152" x2="156" y2="152" stroke="#A8C84B" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- LED -->
  <circle cx="166" cy="116" r="3.5" fill="#A8C84B"/>

  <!-- Mounting plate -->
  <rect x="82" y="186" width="92" height="34" rx="6" fill="#FFFFFF" stroke="#D0D0CC" stroke-width="1"/>
  <circle cx="100" cy="203" r="2.5" fill="#6E6E6E"/>
  <circle cx="156" cy="203" r="2.5" fill="#6E6E6E"/>
  <line x1="112" y1="203" x2="144" y2="203" stroke="#D0D0CC" stroke-width="1" stroke-dasharray="2,3"/>
</svg>
